    <!-- Safari 호환: document.write()로 <script>를 삽입하는 방식을 동적 삽입으로 교체 -->
    <script>
      (function () {
        var _origWrite = document.write.bind(document);
        document.write = function (html) {
          // <script src="..."> 패턴을 잡아 동적 삽입으로 전환
          var srcMatch = typeof html === "string" && html.match(/<script[^>]+src=['"]([^'"]+)['"]/i);
          if (srcMatch) {
            var s = document.createElement("script");
            s.src = srcMatch[1];
            s.async = false; // 순서 보장
            document.head.appendChild(s);
            return;
          }
          _origWrite(html);
        };
      })();
    </script>
    <script src="/api/kakao-sdk"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[SW] registered, scope:', reg.scope))
            .catch(err => console.warn('[SW] registration failed:', err));
        });
      }
    </script>
